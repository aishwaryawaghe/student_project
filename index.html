<!DOCTYPE html>
<html>

<head>
    <title>Student Performance Predictor</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            margin: 0;
            padding: 0;
        }

        .container {
            width: 450px;
            margin: 60px auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            text-align: center;
        }

        h1 {
            margin-bottom: 10px;
            color: #333;
        }

        h3{
            color: #666;
            margin-bottom: 20px;
        }

        input {
            width: 85%;
            padding: 12px;
            margin: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 16px;
        }

        button {
            padding: 12px 20px;
            margin-top: 10px;
            border-radius: 8px;
            border: none;
            background-color: #007bff;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        .result {
            margin-top: 20px;
            font-size: 22px;
            font-weight: bold;
            color: green;
        }

        .footer {
            margin-top: 20px;
            font-size: 13px;
            color: gray;
        }

        .top-buttons{
            margin-bottom:20px;
        }

        .top-buttons a{
            text-decoration:none;
            padding:10px 18px;
            background:#28a745;
            color:white;
            border-radius:8px;
            margin:5px;
            display:inline-block;
        }

        .top-buttons a:hover{
            background:#1e7e34;
        }

    </style>
</head>

<body>

    <div class="container">

        <h1>📊 Student Performance Prediction System</h1>

        <h3>AI-Based Student Marks Prediction</h3>

        <!-- LOGIN & REGISTER BUTTONS -->

        <div class="top-buttons">

            <a href="/login">Login</a>

            <a href="/register">Register</a>

        </div>

        <!-- PREDICTION FORM -->

        <form action="/predict" method="post">

            <input type="number"
                   name="attendance"
                   placeholder="Attendance %"
                   required>

            <input type="number"
                   name="study"
                   placeholder="Study Hours"
                   required>

            <input type="number"
                   name="internal"
                   placeholder="Internal Marks"
                   required>

            <input type="number"
                   name="assignment"
                   placeholder="Assignment Marks"
                   required>

            <input type="number"
                   name="sleep"
                   placeholder="Sleep Hours"
                   required>

            <button type="submit">Predict Marks</button>

        </form>

        <!-- RESULT -->

        {% if prediction_text %}
            <div class="result">
                {{ prediction_text }}
            </div>
        {% endif %}

        <!-- FOOTER -->

        <div class="footer">
            Data Analytics | Machine Learning | Flask Project
        </div>

    </div>

</body>
</html>

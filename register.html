<!DOCTYPE html>
<html>

<head>
    <title>Register</title>

    <style>

        body{
            font-family: Arial;
            background: linear-gradient(to right, #43cea2, #185a9d);
        }

        .container{
            width:350px;
            margin:100px auto;
            background:white;
            padding:30px;
            border-radius:15px;
            text-align:center;
            box-shadow:0 8px 20px rgba(0,0,0,0.2);
        }

        input{
            width:90%;
            padding:12px;
            margin:10px;
            border-radius:8px;
            border:1px solid #ccc;
        }

        button{
            padding:12px 20px;
            background:#28a745;
            color:white;
            border:none;
            border-radius:8px;
            cursor:pointer;
        }

        button:hover{
            background:#1e7e34;
        }

        a{
            display:block;
            margin-top:15px;
            text-decoration:none;
        }

    </style>

</head>

<body>

<div class="container">

    <h2>📝 Student Registration</h2>

    <form method="POST">

        <input type="text"
               name="username"
               placeholder="Enter Username"
               required>

        <input type="password"
               name="password"
               placeholder="Enter Password"
               required>

        <button type="submit">Register</button>

    </form>

    <a href="/login">Already have account? Login</a>

</div>
</body>
</html>
